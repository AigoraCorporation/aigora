    source: math.arithmetic.fractions
    target: math.algebra.linear-equations

  - type: hard_prerequisite
    source: math.algebra.linear-equations
    target: math.algebra.quadratic-equations

profiles:
  - id: profile.enem-math
    name: ENEM Math
    required_nodes:
