name: Generate Changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for changelog entry (e.g., v0.2.0)'
        required: true
        type: string
      rev-range:
        description: 'Git revision range (e.g., v0.1.0..HEAD). Leave empty for commits since last tag.'
        required: false
        type: string
      force-regenerate:
        description: 'Force regeneration even if CHANGELOG exists'
        required: false
        type: boolean
        default: false

jobs:
  generate-changelog:
    # Manual trigger only - full control over changelog generation
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "REV_RANGE=${{ inputs.rev-range }}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          cd tools/changelog_generator
          pip install -e .

      - name: Generate changelog (dry-run preview)
        run: |
          cd tools/changelog_generator
          ARGS="--version ${{ steps.version.outputs.VERSION }} --mode deterministic --dry-run"
          
          if [ -n "${{ steps.version.outputs.REV_RANGE }}" ]; then
            ARGS="${ARGS} --rev-range ${{ steps.version.outputs.REV_RANGE }}"
          fi
          
          python3 cli.py ${ARGS}

      - name: Update CHANGELOG.md
        run: |
          cd tools/changelog_generator
          ARGS="--version ${{ steps.version.outputs.VERSION }} --mode deterministic"
          
          if [ -n "${{ steps.version.outputs.REV_RANGE }}" ]; then
            ARGS="${ARGS} --rev-range ${{ steps.version.outputs.REV_RANGE }}"
          fi
          
          python3 cli.py ${ARGS}

      - name: Check if changelog was modified
        id: changelog-check
        run: |
          if git diff --name-only | grep -q "CHANGELOG.md"; then
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changelog changes
        if: steps.changelog-check.outputs.modified == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          git commit -m "chore(changelog): generate changelog for ${{ steps.version.outputs.VERSION }}"
          git push

      - name: Report if no changelog entries found
        if: steps.changelog-check.outputs.modified == 'false'
        run: |
          echo "⚠️ No changelog entries found. Check if there are conventional commits between versions."
