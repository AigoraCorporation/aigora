name: Generate Changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for changelog entry (e.g., v0.2.0)'
        required: true
        type: string
      rev-range:
        description: 'Git revision range (e.g., v0.1.0..HEAD). Leave empty for commits since last tag.'
        required: false
        type: string
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  generate-changelog:
    # Only run this job for manual trigger or when release branch is the source
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.head_ref == 'release')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "REV_RANGE=${{ inputs.rev-range }}" >> $GITHUB_OUTPUT
          else
            # For PR events, extract version from branch or tags
            # Try to get latest tag and suggest next version
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            
            # Simple increment for patch version (this can be improved)
            BASE_VERSION="${LATEST_TAG%.*}"
            PATCH="${LATEST_TAG##*.}"
            NEXT_PATCH=$((PATCH + 1))
            NEXT_VERSION="${BASE_VERSION}.${NEXT_PATCH}"
            
            echo "VERSION=${NEXT_VERSION}" >> $GITHUB_OUTPUT
            echo "REV_RANGE=${{ inputs.rev-range }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        run: |
          ARGS="--version ${{ steps.version.outputs.VERSION }} --repo ."
          
          if [ -n "${{ steps.version.outputs.REV_RANGE }}" ]; then
            ARGS="${ARGS} --rev-range ${{ steps.version.outputs.REV_RANGE }}"
          fi
          
          python3 tools/changelog_generator.py ${ARGS} --dry-run > /tmp/changelog_entry.txt
          echo "Generated changelog entry:"
          cat /tmp/changelog_entry.txt

      - name: Update CHANGELOG.md
        run: |
          ARGS="--version ${{ steps.version.outputs.VERSION }} --repo ."
          
          if [ -n "${{ steps.version.outputs.REV_RANGE }}" ]; then
            ARGS="${ARGS} --rev-range ${{ steps.version.outputs.REV_RANGE }}"
          fi
          
          python3 tools/changelog_generator.py ${ARGS}

      - name: Check if changelog was modified
        id: changelog-check
        run: |
          if git diff --name-only | grep -q "CHANGELOG.md"; then
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changelog changes
        if: steps.changelog-check.outputs.modified == 'true' && github.event_name == 'pull_request'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          git commit -m "chore(changelog): generate changelog for ${{ steps.version.outputs.VERSION }}"
          git push

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.changelog-check.outputs.modified == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Changelog automatically generated for ${{ steps.version.outputs.VERSION }}\n\nThe CHANGELOG.md has been updated with entries from the latest commits.'
            })

      - name: Report if no changelog entries found
        if: steps.changelog-check.outputs.modified == 'false'
        run: |
          echo "⚠️ No changelog entries found. Check if there are conventional commits between versions."
