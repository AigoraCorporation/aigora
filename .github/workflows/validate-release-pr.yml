name: Validate Release PR

on:
  pull_request:
    branches:
      - main

jobs:
  validate-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check source branch is release
        run: |
          echo "Base branch: ${{ github.base_ref }}"
          echo "Head branch: ${{ github.head_ref }}"

          if [ "${{ github.head_ref }}" != "release" ]; then
            echo "Only PRs from 'release' to 'main' are allowed for release publication."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was modified
        run: |
          # Ensure we have both remote branches for comparison
          git fetch origin ${{ github.base_ref }} ${{ github.head_ref }} --depth=1
          
          # Establish tracking for remote branches
          git remote set-head origin -a
          
          # Get the merge base to ensure proper comparison
          BASE_COMMIT=$(git merge-base origin/${{ github.base_ref }} origin/${{ github.head_ref }})
          HEAD_COMMIT=$(git rev-parse origin/${{ github.head_ref }})
          
          echo "📊 Comparing remote states:"
          echo "Base branch (origin/${{ github.base_ref }}): $BASE_COMMIT"
          echo "Head branch (origin/${{ github.head_ref }}): $HEAD_COMMIT"
          echo ""
          
          # Compare remote branches directly
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...origin/${{ github.head_ref }})

          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          echo "$CHANGED_FILES" | grep -Fx "CHANGELOG.md" >/dev/null || {
            echo "❌ CHANGELOG.md must be updated in release PRs to main."
            echo ""
            echo "📝 Before opening a release PR, generate the CHANGELOG:"
            echo "1. Go to Actions → Generate Changelog"
            echo "2. Click 'Run workflow'"
            echo "3. Enter your version (e.g., v0.2.0)"
            echo "4. Click 'Run workflow' to generate and push to release branch"
            echo "5. Then open the PR to main"
            exit 1
          }

      - name: Detect stale CHANGELOG (late-arriving PRs)
        run: |
          git fetch origin release --depth=1
          
          # Count commits in release branch
          COMMIT_COUNT=$(git rev-list --count origin/release)
          
          echo "📝 Commits in release branch: $COMMIT_COUNT"
          echo ""
          
          if [ "$COMMIT_COUNT" -gt 0 ]; then
            echo "ℹ️  If new commits were merged to release after CHANGELOG generation,"
            echo "   consider regenerating the CHANGELOG:"
            echo "   1. Go to Actions → Generate Changelog"
            echo "   2. Click 'Run workflow' with force-regenerate enabled"
            echo "   3. This will update the PR with fresh CHANGELOG"
          fi

      - name: Validate changelog format
        run: |
          # Check if CHANGELOG.md contains valid sections
          if ! grep -q "^### " CHANGELOG.md; then
            echo "⚠️ Warning: CHANGELOG.md sections not found (Added, Changed, Fixed, Removed)"
          fi
          
          # Check if version entry exists
          if grep -q "^## \[" CHANGELOG.md; then
            echo "✓ CHANGELOG.md contains version entries"
          else
            echo "⚠️ Warning: CHANGELOG.md does not contain version entries"
          fi